name: Update dist snapshot

on:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:
  repository_dispatch:
    types: [ocx-released]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-dist
  cancel-in-progress: false

jobs:
  update:
    name: Refresh the embedded dist.json snapshot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Refresh snapshot in ocx.cmake
        run: |
          python3 scripts/update_dist.py
          python3 scripts/update_dist.py --check
      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v7
        with:
          branch: chore/update-dist
          commit-message: "chore(dist): refresh embedded dist.json snapshot"
          title: "chore(dist): refresh embedded dist.json snapshot"
          body: >
            Automated refresh of the setup.ocx.sh release manifest embedded
            in `ocx.cmake`. Bump `__OCX_PIN_VERSION` separately and
            deliberately (see CONTRIBUTING.md).
